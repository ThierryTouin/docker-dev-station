---
services:
  firefox:
    image: lscr.io/linuxserver/firefox:latest
    container_name: firefox
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - LC_ALL=fr_FR.UTF-8
      - CUSTOM_USER=korben
      - PASSWORD=changezmoi
      - HARDEN_DESKTOP=true
      - HARDEN_OPENBOX=true
    volumes:
      - ./firefox-config:/config
    ports:
      - 3001:3001
    shm_size: "1gb"
    #restart: unless-stopped
