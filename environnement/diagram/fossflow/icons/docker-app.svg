<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">
  <defs>
    <linearGradient id="baseGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF3FF"/>
      <stop offset="100%" stop-color="#C9DBFF"/>
    </linearGradient>

    <linearGradient id="whaleGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <linearGradient id="glassGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#BFDBFE" stop-opacity="0.15"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Base -->
  <g filter="url(#shadow)" transform="translate(0,-24)">
    <path d="M96 360L256 280L416 360L256 440L96 360Z" fill="url(#baseGradient)"/>
    <path d="M96 360V390L256 470V440L96 360Z" fill="#B7CCF7"/>
    <path d="M416 360V390L256 470V440L416 360Z" fill="#9FB9F3"/>
  </g>

  <!-- Glass cube -->
  <g opacity="0.9">
    <path d="M140 160L256 100L372 160L256 220L140 160Z" fill="url(#glassGradient)" stroke="#93C5FD" stroke-width="2"/>

    <path d="M140 160V320L256 380V220L140 160Z" fill="url(#glassGradient)" stroke="#93C5FD" stroke-width="2"/>

    <path d="M372 160V320L256 380V220L372 160Z" fill="url(#glassGradient)" stroke="#93C5FD" stroke-width="2"/>
  </g>

  <!-- Docker whale -->
  <g filter="url(#shadow)">
    <path d="M180 275C180 235 210 205 260 205C305 205 338 230 344 266C347 287 338 308 320 320C296 337 253 340 220 329C195 320 180 301 180 275Z" fill="url(#whaleGradient)"/>

    <path d="M338 260L374 236L360 276Z" fill="#2563EB"/>

    <ellipse cx="235" cy="265" rx="8" ry="8" fill="#FFFFFF"/>
    <circle cx="237" cy="265" r="3" fill="#1E3A8A"/>

    <path d="M190 295C210 310 255 314 286 304" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Containers -->
  <g>
    <rect x="205" y="180" width="40" height="32" rx="4" fill="#2563EB"/>
    <rect x="250" y="180" width="40" height="32" rx="4" fill="#3B82F6"/>
    <rect x="295" y="180" width="40" height="32" rx="4" fill="#60A5FA"/>

    <rect x="227" y="145" width="40" height="32" rx="4" fill="#2563EB"/>
    <rect x="272" y="145" width="40" height="32" rx="4" fill="#3B82F6"/>

    <rect x="250" y="110" width="40" height="32" rx="4" fill="#2563EB"/>
  </g>

  <!-- Center alignment helper (invisible anchor) -->
  <circle cx="256" cy="256" r="2" fill="transparent"/>

  <!-- App label -->
  <g>
    <rect x="190" y="388" width="132" height="42" rx="12" fill="#2563EB"/>
    <text x="256" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="white" font-weight="bold">APP</text>
  </g>
</svg>

